<script>

   function ultraPrediction() {
    // More varied prediction logic
    let r = Math.random();
    let bigSmall = (r >
 0.5) ? "BIG" : "SMALL";
    let number = (bigSmall === "BIG") ? Math.floor(Math.random() * 5)   5 : Math.floor(Math.random() * 5);
    
    // Determine color based on number
    let color;
    if(number === 0 || number === 5) {
        color = "VIOLET";
    } else if(number % 2 === 0) {
        color = "RED";
    } else {
        color = "GREEN";
    }
    
    return { bigSmall, number, color };
}

let time = 30;
let currentResult = ultraPrediction();

function updateTimer() {
    document.getElementById("timer").innerText = "Next Time: "   time   "s";
}

function updatePrediction() {
    // Show loading animation
    const bsText = document.getElementById("bsText");
    const colorText = document.getElementById("colorText");
    const numberText = document.getElementById("numberText");
    
    bsText.innerHTML = '
<div class="loading">

</div>
';
    colorText.innerHTML = '
<div class="loading">

</div>
';
    numberText.innerHTML = '
<div class="loading">

</div>
';
    
    // After a short delay, show the new prediction
    setTimeout(() =>
 {
        currentResult = ultraPrediction();
        
        bsText.innerText = currentResult.bigSmall;
        bsText.className = (currentResult.bigSmall === "BIG") ? "big fade-in" : "small fade-in";
        
        colorText.innerText = currentResult.color;
        if(currentResult.color === "GREEN") {
            colorText.className = "green fade-in";
        } else if(currentResult.color === "RED") {
            colorText.className = "red fade-in";
        } else {
            colorText.className = "violet fade-in";
        }
        
        numberText.innerText = "Number: "   currentResult.number;
        numberText.className = "fade-in";
    }, 300);
}

function showToast(message, type) {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.className = type;
    toast.style.display = "block";
    setTimeout(() =>
 { toast.style.display = "none"; }, 2000);
}

const loginBtn = document.getElementById("loginBtn");
const passwordInput = document.getElementById("passwordInput");
const loginForm = document.getElementById("loginForm");
const predictionUI = document.getElementById("predictionUI");
const predictionBox = document.getElementById("predictionBox");

loginBtn.addEventListener("click", () =>
 {
    if(passwordInput.value === "FX699"){
        showToast("Login Successful!", "success");
        loginForm.style.display = "none";
        predictionUI.style.display = "block";
        updatePrediction();
        
        // Timer logic from the second example
        setInterval(() =>
 {
            time--;
            if(time 
<= 0){
                time = 30;
                updatePrediction();
            }
            updateTimer();
        }, 1000);
    } else {
        showToast("Invalid Password!", "error");
        passwordInput.value = "";
    }
});

// Dragging Logic
let drag = false, dx = 0, dy = 0;
predictionBox.addEventListener("mousedown", e =>
 { 
    drag = true; 
    dx = e.clientX - predictionBox.offsetLeft; 
    dy = e.clientY - predictionBox.offsetTop; 
});
document.addEventListener("mousemove", e =>
 { 
    if (!drag) return; 
    predictionBox.style.left = (e.clientX - dx)   "px"; 
    predictionBox.style.top = (e.clientY - dy)   "px"; 
    predictionBox.style.bottom = "auto"; 
    predictionBox.style.right = "auto"; 
});
document.addEventListener("mouseup", () =>
 drag = false);

// Touch Support for Mobile
predictionBox.addEventListener("touchstart", e =>
 { 
    drag = true; 
    let t = e.touches[0]; 
    dx = t.clientX - predictionBox.offsetLeft; 
    dy = t.clientY - predictionBox.offsetTop; 
});
document.addEventListener("touchmove", e =>
 { 
    if (!drag) return; 
    let t = e.touches[0]; 
    predictionBox.style.left = (t.clientX - dx)   "px"; 
    predictionBox.style.top = (t.clientY - dy)   "px"; 
    predictionBox.style.bottom = "auto"; 
    predictionBox.style.right = "auto"; 
});
document.addEventListener("touchend", () =>
 drag = false);
  
</script>
