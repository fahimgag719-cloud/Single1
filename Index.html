<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>𓆩×͜×𓆪𝐅&Μ 𝐅𝐀𝐇𝐈Μ</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    background:#000;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    width:100vw;
    height:100vh;
}

/* ===== Animation Overlay ===== */
#animation-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999999;
}

.anim-content{
    width:400px;
    height:400px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.profile-img-anim{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    z-index:20;
}

.rgb-border-anim{
    position:absolute;
    width:210px;
    height:210px;
    border-radius:50%;
    background:conic-gradient(#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000);
    animation:rotate 1.5s linear infinite;
}

.rgb-border-anim::after{
    content:'';
    position:absolute;
    inset:6px;
    background:#000;
    border-radius:50%;
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* ===== Frame ===== */
.site-frame{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    z-index:1;
}

/* ===== Notice ===== */
#adminNoticeBar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:rgba(255,0,102,0.9);
    color:#fff;
    z-index:99999;
    padding:5px;
    font-size:12px;
}

/* ===== Floating Logo ===== */
#floatingCenterLogo{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:60vw;
    max-width:300px;
    opacity:0.12;
    z-index:2;
}

/* ===== Ripple ===== */
#rippleLayer{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:9999;
}

/* ===== Login Modal ===== */
.modal-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
}

.login-card{
    background:rgba(10,15,30,0.95);
    width:85%;
    max-width:320px;
    padding:30px 20px;
    border-radius:25px;
    text-align:center;
}

/* Inputs */
.input-box{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid #00eeff;
    background:rgba(255,255,255,0.05);
    color:#fff;
    margin-bottom:10px;
}

/* Button */
.enter-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#00eeff,#7b2cbf);
    color:#fff;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- Animation -->
<div id="animation-overlay">
    <div class="anim-content">
        <div class="rgb-border-anim"></div>

        <img src="https://files.catbox.moe/z6mt88.jpg" class="profile-img-anim">
    </div>
</div>

<!-- Notice -->
<div id="adminNoticeBar">
<marquee>পাসওয়ার্ড নিতে হলে VIP তে জয়েন হতে হবে</marquee>
</div>

<!-- Game Frame -->
<iframe class="site-frame"
src="https://dkwin9.com/#/register?invitationCode=281661285126"></iframe>

<!-- Floating Image -->
<img id="floatingCenterLogo"
src="https://files.catbox.moe/z6mt88.jpg">

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">

<div class="login-card">

<img src="https://files.catbox.moe/z6mt88.jpg"
style="width:80px;height:80px;border-radius:50%;">

<h3 style="color:#fff;margin:10px 0;">
𓆩×͜×𓆪𝐅&Μ 𝐅𝐀𝐇𝐈Μ
</h3>

<input class="input-box" type="text" placeholder="GAME UID">
<input class="input-box" type="password" placeholder="ACCESS KEY">

<button class="enter-btn">VERIFY & INJECT</button>

</div>

</div>

</body>
</html>
