<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP AI Prediction Engine</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

iframe{
position:fixed;
inset:0;
width:100%;
height:100%;
border:none;
z-index:1;
}

#box{
position:fixed;
top:30px;
left:30px;
width:240px;
z-index:9999;
cursor:move;
}

.glass{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.15);
backdrop-filter: blur(18px);
border-radius:16px;
padding:12px;
box-shadow:0 0 25px rgba(0,255,255,0.15);
animation: float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

input{
width:100%;
padding:10px;
border:none;
outline:none;
border-radius:10px;
text-align:center;
background:rgba(0,0,0,0.5);
color:#00eaff;
font-weight:bold;
box-shadow:0 0 10px #00eaff;
}

button{
width:100%;
margin-top:8px;
padding:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
color:#fff;
background:linear-gradient(45deg,#00eaff,#0066ff);
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00eaff;
}

#panel{
display:none;
color:#fff;
text-align:center;
}

#timer{
font-size:18px;
color:#00ffcc;
text-shadow:0 0 10px #00ffcc;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{opacity:0.5}
}

#result{
font-size:22px;
font-weight:900;
margin:6px 0;
animation: pop 0.4s ease;
}

@keyframes pop{
0%{transform:scale(0.3);opacity:0}
100%{transform:scale(1);opacity:1}
}

#dot{
width:12px;
height:12px;
border-radius:50%;
margin:8px auto;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.2}
}

.bar{
width:100%;
height:6px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:6px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff88,#00eaff,#0066ff);
transition:0.4s;
}

#next{
font-size:12px;
color:#aaa;
margin-top:6px;
}

#msg{
display:none;
color:red;
font-size:12px;
margin-top:5px;
text-align:center;
}

</style>

</head>

<body>

<iframe src="https://240bdwin24.com/register?inviteCode=9K7NYQN&from=web"></iframe>

<div id="box">

<div class="glass" id="login">
<input type="password" id="password" placeholder="VIP KEY">
<button id="loginBtn">ENTER SYSTEM</button>
<div id="msg">Wrong Password</div>
</div>

<div class="glass" id="panel">
<div id="timer">00:00</div>
<div id="result">---</div>
<div id="dot"></div>
<div class="bar">
<div class="fill" id="fill"></div>
</div>
<div id="next">NEXT: ---</div>
</div>

</div>

<script>

const PASS = "FMS69";

const login = document.getElementById("login");
const panel = document.getElementById("panel");
const msg = document.getElementById("msg");

document.getElementById("loginBtn").onclick = () => {
    const v = document.getElementById("password").value;

    if(v === PASS){
        login.style.display="none";
        panel.style.display="block";
        engine();
    } else {
        msg.style.display="block";
    }
};

/* DRAG SYSTEM */
const box = document.getElementById("box");

let isDown = false;
let offsetX, offsetY;

box.addEventListener("mousedown", e=>{
    isDown = true;
    offsetX = e.clientX - box.offsetLeft;
    offsetY = e.clientY - box.offsetTop;
});

document.addEventListener("mousemove", e=>{
    if(!isDown) return;
    box.style.left = (e.clientX - offsetX) + "px";
    box.style.top = (e.clientY - offsetY) + "px";
});

document.addEventListener("mouseup", ()=> isDown=false);

/* MOBILE TOUCH */
box.addEventListener("touchstart", e=>{
    isDown = true;
    offsetX = e.touches[0].clientX - box.offsetLeft;
    offsetY = e.touches[0].clientY - box.offsetTop;
});

document.addEventListener("touchmove", e=>{
    if(!isDown) return;
    box.style.left = (e.touches[0].clientX - offsetX) + "px";
    box.style.top = (e.touches[0].clientY - offsetY) + "px";
});

document.addEventListener("touchend", ()=> isDown=false);

/* ENGINE */
function getPair(type, seed){
    const big = [5,6,7,8,9];
    const small = [0,1,2,3,4];
    const set = type==="BIG"?big:small;

    let a = set[seed % 5];
    let b = set[(seed*3+1)%5];

    if(a===b){
        b = set[(seed+2)%5];
    }

    return `${a}, ${b}`;
}

function engine(){

const timer = document.getElementById("timer");
const result = document.getElementById("result");
const dot = document.getElementById("dot");
const fill = document.getElementById("fill");
const next = document.getElementById("next");

function tick(){

const now = new Date();
const left = 30 - (now.getSeconds()%30);

timer.innerText = `00:${left<10?"0"+left:left}`;

const cycle = Math.floor(Date.now()/30000);

const current = cycle%2===0?"BIG":"SMALL";
const nxt = (cycle+1)%2===0?"BIG":"SMALL";

const nums = getPair(current,cycle);

result.innerHTML = current + "<br><span style='font-size:14px'>"+nums+"</span>";

result.style.color = current==="BIG"?"#00ff88":"#ff0066";

dot.style.background = current==="BIG"?"lime":"red";

next.innerText = "NEXT: " + nxt;

fill.style.width = (60 + (cycle%40)) + "%";

}

setInterval(tick,1000);
tick();

}

</script>

</body>
</html>
