<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<title>Protected Content</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    border: none;
}

#predictionBox {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #000000e0;
    padding: 12px 16px;
    border-radius: 16px;
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    width: 160px;
    text-align: center;
    border: 2px solid #ff6b6b;
    box-shadow: 0 0 15px #ff6b6b88;
    z-index: 99999;
    cursor: grab;
    user-select: none;
}

#boxTitle {
    font-size: 16px;
    margin-bottom: 8px;
    color: #ff6b6b;
}

.big { color: #4ecdc4; }
.small { color: #ff6b6b; }
.green { color: #4ecdc4; }
.red { color: #ff6b6b; }
.violet { color: #e040fb; }

.timer { 
    font-size: 14px; 
    margin-top: 8px; 
    color: #bbb; 
    border-top: 1px solid #444;
    padding-top: 5px;
}

#loginForm input {
    width: 130px;
    padding: 6px;
    border-radius: 8px;
    border: none;
    margin-bottom: 8px;
    text-align: center;
}

#loginForm button {
    padding: 6px 15px;
    border-radius: 8px;
    border: none;
    background: #ff6b6b;
    font-weight: bold;
    cursor: pointer;
}

#toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    display: none;
    z-index: 100000;
}

.loading {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<iframe src="https://dkwin9.com/#/register?invitationCode=34464109402"></iframe>

<div id="predictionBox">
<div id="boxTitle">👑 F&M FAHIM 👑</div>

<div id="loginForm">
<input id="passwordInput" placeholder="Enter Password" type="password">
<br>
<button id="loginBtn">Login</button>
</div>

<div id="predictionUI" style="display:none;">
<div id="bsText">--</div>
<div id="colorText">--</div>
<div id="numberText">--</div>
<div class="timer" id="timer">Next Time: 30s</div>
</div>
</div>

<div id="toast"></div>

<script>
// Prediction logic
function ultraPrediction() {
    let r = Math.random();
    let bigSmall = (r > 0.5) ? "BIG" : "SMALL";
    let number = (bigSmall === "BIG") 
        ? Math.floor(Math.random() * 5) + 5 
        : Math.floor(Math.random() * 5);

    let color;
    if(number === 0 || number === 5) color = "VIOLET";
    else if(number % 2 === 0) color = "RED";
    else color = "GREEN";

    return { bigSmall, number, color };
}

let time = 30;

function updatePrediction() {
    const bs = document.getElementById("bsText");
    const col = document.getElementById("colorText");
    const num = document.getElementById("numberText");

    bs.innerHTML = `<div class="loading"></div>`;
    col.innerHTML = `<div class="loading"></div>`;
    num.innerHTML = `<div class="loading"></div>`;

    setTimeout(() => {
        let r = ultraPrediction();

        bs.innerText = r.bigSmall;
        bs.className = (r.bigSmall === "BIG") ? "big" : "small";

        col.innerText = r.color;
        col.className = r.color.toLowerCase();

        num.innerText = "Number: " + r.number;
    }, 300);
}

function updateTimer() {
    document.getElementById("timer").innerText = "Next Time: " + time + "s";
}

function showToast(msg) {
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=> t.style.display="none",2000);
}

// Login
document.getElementById("loginBtn").onclick = function(){
    if(document.getElementById("passwordInput").value === "FX699"){
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("predictionUI").style.display = "block";
        showToast("Login OK");

        updatePrediction();

        setInterval(()=>{
            time--;
            if(time <= 0){
                time = 30;
                updatePrediction();
            }
            updateTimer();
        },1000);

    } else {
        showToast("Wrong Password");
    }
};

// Drag
let box = document.getElementById("predictionBox");
let drag=false,dx,dy;

box.onmousedown = e=>{
    drag=true;
    dx=e.clientX-box.offsetLeft;
    dy=e.clientY-box.offsetTop;
};

document.onmousemove = e=>{
    if(!drag) return;
    box.style.left=(e.clientX-dx)+"px";
    box.style.top=(e.clientY-dy)+"px";
};

document.onmouseup = ()=> drag=false;
</script>

</body>
</html>
