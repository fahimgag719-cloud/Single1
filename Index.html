<!DOCTYPE html>

<body onmousedown="createRipple(event)" ontouchstart="createRipple(event)">

<div id="animation-overlay">
  <div class="anim-content">

    <div class="outer-ring-anim"></div>
    <div class="bar-anim bar-1-anim"></div>
    <div class="bar-anim bar-2-anim"></div>
    <div class="bar-anim bar-3-anim"></div>

    <div class="laser-anim laser-red-anim" style="left: 20%"></div>
    <div class="laser-anim laser-blue-anim" style="right: 20%"></div>
    <div class="laser-anim laser-yellow-anim" style="top: 10%"></div>
    <div class="laser-anim laser-green-anim" style="bottom: 10%"></div>

    <div class="particle-anim p1-anim"></div>
    <div class="particle-anim p2-anim"></div>
    <div class="particle-anim p3-anim"></div>
    <div class="particle-anim p4-anim"></div>

    <div class="rgb-border-anim"></div>

    <!-- ✅ IMAGE REPLACED -->
    <img src="https://files.catbox.moe/z6mt88.jpg" class="profile-img-anim">

  </div>
</div>

<div id="adminNoticeBar" style="display: block;">
  <marquee>পাসওয়ার্ড নিতে হলে VIP তে জয়েন হতে হবে</marquee>
</div>

<iframe id="gameFrame" class="site-frame"
src="https://dkwin15.com/#/register?invitationCode=76284101828"></iframe>

<div id="rippleLayer"></div>

<!-- ✅ IMAGE REPLACED -->
<img id="floatingCenterLogo" src="https://files.catbox.moe/z6mt88.jpg">

<!-- Minimized Logo -->
<div id="minimizedLogo" onclick="maximizePanel()">
  <img src="https://files.catbox.moe/z6mt88.jpg"
  style="width:100%;height:100%;object-fit:cover;">
</div>

<div class="floating-container" id="uiControls">

  <div class="logo-btn" onclick="toggleFinger()">
    <img id="mainLogo"
    src="https://files.catbox.moe/z6mt88.jpg"
    style="width:100%;height:100%;object-fit:cover;">
  </div>

  <div class="finger-btn" id="fingerBtn" onclick="showLogin()">
    <i class="fas fa-fingerprint" style="color:#ff0066; font-size:24px;"></i>
  </div>

</div>

<div class="modal-overlay" id="loginModal">
  <div class="login-card">

    <div style="width:80px;height:80px;border-radius:50%;border:3px solid #00eeff;margin:0 auto 15px;overflow:hidden;background:#000;">
      <!-- ✅ IMAGE REPLACED -->
      <img id="loginProfile"
      src="https://files.catbox.moe/z6mt88.jpg"
      style="width:100%;height:100%;object-fit:cover;">
    </div>

    <h4 style="color:#fff;">𓆩×͜×𓆪𝐅&Μ 𝐅𝐀𝐇𝐈Μ</h4>

    <input type="tel" class="input-box" placeholder="GAME UID">
    <input type="password" class="input-box" placeholder="ACCESS KEY">

    <button class="enter-btn">VERIFY & INJECT</button>

  </div>
</div>

<div class="target-screen" id="targetScreen">

  <!-- ✅ IMAGE REPLACED -->
  <img src="https://files.catbox.moe/z6mt88.jpg"
  style="width:100px;filter:drop-shadow(0 0 15px red);">

</div>
